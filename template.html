<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════════════
     template.html – Avalins Matematikverkstad
     SKELETT för nya modulsidor. Extraherat ur koordinat.html/multiplikation.html.

     SÅ HÄR ANVÄNDER DU MALLEN (en ny modulsida, t.ex. geometri.html):
       1. Kopiera denna fil → <modul>.html (t.ex. geometri.html).
       2. Byt titel, <h1> (emoji + namn) och modulrubriker.
       3. Lägg den RENA logiken i logic/<modul>.js (UMD-mönster, nivå som
          parameter) — INTE inline här. Avkommentera <script src>-raden nedan.
          Se logic/koordinat.js eller logic/multiplikation.js som förebild.
       4. Duplicera modulblocket (HTML-kort + JS-block) per modul. Numrera m1, m2 …
       5. Registrera sidan i index.html (en .modul-knapp).
       6. Lägg till tester i tests/test.js och kör: node tests/test.js
       7. Kör kvalitetsgrinden: självkoll → tester → /code-review → webbverify.

     Nedan finns ETT exempelmodul-block (m1) med en INLINE-exempelgenerator,
     bara så att mallen går att öppna och klicka på direkt. Flytta generatorn
     till logic/<modul>.js när du bygger på riktigt.
═══════════════════════════════════════════════════════════════════════ -->
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBRIK – Avalins Matematikverkstad</title>
    <link rel="stylesheet" href="style.css">
    <script src="storage.js"></script>
    <script src="ui.js"></script>
    <script src="logic/shared.js"></script>
    <!-- <script src="logic/MODUL.js"></script>  ← lägg din rena logik här (UMD) -->
    <style>
        /* Rubrik i heading-färg istället för style.css primary */
        .section-title { color: var(--color-heading); }

        /* Badge: ljus text mot #C8A882-bakgrund */
        .level-badge { color: #FFF8F0; }

        /* Svarsalternativ: explicit yta och tunn kantlinje */
        .choice-btn { background: var(--color-surface); border: 1.5px solid var(--color-border); }

        #miso-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }
        #miso-img { width: clamp(100px, 12vw, 140px); display: block; }
        #miso-bubble {
            display: none;
            background: rgba(255,248,240,0.88);
            border: 2px solid var(--color-border);
            border-radius: 16px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 0.85em;
            max-width: 160px;
            text-align: center;
            color: var(--color-text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html">← Avalins Matematikverkstad</a>
</nav>

<h1>🔧 RUBRIK</h1>  <!-- TODO: byt emoji + namn -->

<!-- ══════ Modul 1 ══════ (duplicera detta block per modul: m2, m3 …) -->
<p class="section-title">Modul 1 – BESKRIVNING</p>

<div class="card">
    <p class="task-label">FRÅGA TILL ELEVEN?</p>

    <div style="text-align:center">
        <span class="level-badge" id="m1LevelLabel">Nivå 1</span>
    </div>

    <!-- Här kan en bild/SVG/uttryck ligga (se koordinat.html / multiplikation.html). -->
    <p id="m1Expr" style="text-align:center; font-size:2em; font-weight:bold; color:var(--color-text); margin:8px 0 20px"></p>

    <div class="choice-row" id="m1Choices"></div>

    <div class="btn-row">
        <button class="btn-secondary" id="m1Next">Ny uppgift →</button>
    </div>

    <p class="streak" id="m1Streak"></p>
    <div class="feedback" id="m1Feedback" aria-live="polite"></div>
</div>

<!-- Miso-container MÅSTE ligga omedelbart före <script> (se RÖDA FLAGGOR i CLAUDE.md) -->
<div id="miso-container">
    <div id="miso-bubble"></div>
    <img id="miso-img" src="images/miso/miso-neutral.webp" alt="Miso" width="100">
</div>

<script>
const CAT_NAME = "Miso";
initStatsBar();

/* ────────────────────────────────────────────────────────────────
   EXEMPELGENERATOR — flytta till logic/MODUL.js (UMD) när du bygger
   på riktigt, och avkommentera <script src="logic/MODUL.js"> ovan.
   Här: ett enkelt additionsexempel så mallen går att klicka på direkt.
──────────────────────────────────────────────────────────────── */
function genM1Task(level) {
    const max = level === 0 ? 10 : level === 1 ? 20 : 50;
    const a = rnd(1, max), b = rnd(1, max);
    const correct = a + b;
    const cand = [correct + 1, correct - 1, correct + 10, correct - 10, a * b]
        .filter(v => v > 0 && v !== correct);
    // 3 distinkta distraktorer
    const seen = new Set([correct]), distractors = [];
    for (const c of cand) { if (!seen.has(c)) { seen.add(c); distractors.push(c); } if (distractors.length >= 3) break; }
    return { a, b, correct, distractors, label: a + ' + ' + b + ' = ?' };
}

/* ════════════════════════════════
   Modul 1 – STANDARDMÖNSTER (kopiera per modul, byt prefix m1 → m2 …)
════════════════════════════════ */

let m1Streak = 0, m1Task = null, m1Answered = false, m1HadError = false;
let m1Level = 0, m1LevelStreak = 0;

function buildM1() {
    m1Task = genM1Task(m1Level); m1Answered = false; m1HadError = false;

    document.getElementById('m1Expr').textContent = m1Task.label;

    // blanda facit + distraktorer
    const choices = [m1Task.correct, ...m1Task.distractors];
    for (let i = choices.length - 1; i > 0; i--) {
        const j = rnd(0, i);
        [choices[i], choices[j]] = [choices[j], choices[i]];
    }

    const row = document.getElementById('m1Choices');
    row.innerHTML = '';
    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = val;
        btn.addEventListener('click', () => m1Check(val, btn));
        row.appendChild(btn);
    });

    document.getElementById('m1LevelLabel').textContent = 'Nivå ' + (m1Level + 1);
    document.getElementById('m1Feedback').textContent   = '';
    document.getElementById('m1Next').classList.remove('btn-pulse');
}

function m1Check(val, btn) {
    if (m1Answered) return;                       // answered-flagga blockerar dubbelklick
    const fb = document.getElementById('m1Feedback');

    if (val === m1Task.correct) {
        m1Answered = true;
        btn.classList.add('ok');
        document.querySelectorAll('#m1Choices .choice-btn').forEach(b => { b.disabled = true; });

        // streak ökar bara om uppgiften klarades utan fel (hadError-flagga)
        if (!m1HadError) { m1Streak++; m1LevelStreak++; recordCorrect(); }
        else             { m1Streak = 0; m1LevelStreak = 0; }
        setStreak('m1Streak', m1Streak);

        // avancera efter 3 rena rätt i rad
        if (m1LevelStreak >= 3 && m1Level < 2) {
            m1Level++;
            m1LevelStreak = 0;
            document.getElementById('m1LevelLabel').textContent = 'Nivå ' + (m1Level + 1);
            fb.textContent = 'Precis rätt! 🎉 Superbra – nu provar vi svårare tal!';
        } else {
            fb.textContent = 'Precis rätt! 🎉 Jättebra, Avalin!';
        }
        showMiso('glad', 'Rätt! Toppen!');
        document.getElementById('m1Next').classList.add('btn-pulse');   // pulse på Ny uppgift
    } else {
        m1HadError    = true;
        m1LevelStreak = 0;
        btn.classList.add('err');
        btn.disabled = true;                      // lås bara fel knapp; eleven kan välja igen
        fb.textContent = 'Nästan – rätt svar är ' + m1Task.correct + '.';   // TODO: konkret ledtråd
        showMiso('uppmuntrande', 'Nästan – försök igen!');
    }
}

document.getElementById('m1Next').addEventListener('click', () => { showMiso('neutral', 'Ny uppgift – kör på!'); buildM1(); });
buildM1();
</script>
</body>
</html>
