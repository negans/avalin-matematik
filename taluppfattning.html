<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taluppfattning – Avalins Matematikverkstad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f7ff;
            min-height: 100vh;
            padding: 16px 16px 48px;
        }

        .top-nav { text-align: center; margin-bottom: 10px; }
        .top-nav a { color: #7a9cbf; text-decoration: none; font-size: 0.95em; }
        .top-nav a:hover { text-decoration: underline; }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.9em;
            margin-bottom: 6px;
        }

        .section-title {
            text-align: center;
            font-size: 1.05em;
            font-weight: bold;
            color: #4a90d9;
            margin: 22px 0 10px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 22px 20px 20px;
            max-width: 500px;
            margin: 0 auto 12px;
            box-shadow: 0 2px 12px rgba(44,62,80,0.09);
        }

        .task-label {
            text-align: center;
            font-size: 1.2em;
            color: #2c3e50;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        /* ── buttons ── */
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            font-family: Arial, sans-serif;
            font-size: 1.05em;
            padding: 11px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.45; cursor: not-allowed; }

        .btn-secondary {
            background: white;
            color: #4a90d9;
            border: 2px solid #4a90d9;
        }
        .btn-secondary:hover { background: #e8f2ff; }

        @keyframes btn-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74,144,217,0.5); }
            60%  { box-shadow: 0 0 0 8px rgba(74,144,217,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,144,217,0); }
        }
        .btn-pulse { animation: btn-pulse 1.1s ease-out infinite; }

        .streak {
            text-align: center;
            font-size: 0.85em;
            color: #8aaabf;
            min-height: 18px;
            margin-top: 8px;
        }

        .feedback {
            text-align: center;
            font-size: 1.05em;
            color: #2c3e50;
            min-height: 28px;
            margin-top: 4px;
            line-height: 1.5;
        }

        /* ── Modul 1: positionstabell ── */
        .number-display {
            display: flex;
            justify-content: center;
            margin: 6px auto 22px;
            border: 2.5px solid #b8d4ef;
            border-radius: 16px;
            overflow: hidden;
        }

        .digit-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 100px;
            border-right: 2px solid #b8d4ef;
        }
        .digit-col:last-child { border-right: none; }

        .digit {
            font-size: 3.2em;
            font-weight: bold;
            color: #2c3e50;
            padding: 16px 10px 10px;
            width: 100%;
            text-align: center;
            line-height: 1;
        }
        .digit.highlighted { background: #ffe566; }

        .pos-label {
            font-size: 0.75em;
            color: #8aaabf;
            padding: 5px 4px 7px;
            text-align: center;
            width: 100%;
            border-top: 1.5px solid #b8d4ef;
            background: #f8fbff;
            letter-spacing: 0.01em;
        }
        .pos-label.highlighted {
            color: #9a6900;
            font-weight: bold;
            background: #fff8cc;
        }

        /* ── Modul 1: svarsalternativ ── */
        .choice-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 0 0 10px;
        }

        .choice-btn {
            font-family: Arial, sans-serif;
            font-size: 1.4em;
            font-weight: bold;
            padding: 14px 22px;
            border: 2.5px solid #4a90d9;
            border-radius: 16px;
            background: white;
            color: #2c3e50;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            min-width: 88px;
            text-align: center;
        }
        .choice-btn:hover:not(:disabled) { background: #e8f2ff; border-color: #3a7fc8; }
        .choice-btn:active:not(:disabled) { transform: scale(0.95); }
        .choice-btn:disabled { cursor: not-allowed; }
        .choice-btn.ok  { background: #f0fff4; border-color: #2ecc71; color: #27ae60; opacity: 1; }
        .choice-btn.err { background: #fff5f5; border-color: #e74c3c; color: #c0392b; opacity: 0.45; }

        /* ── Modul 2: kompakt positionstabell ── */
        .number-display.compact .digit-col { min-width: 78px; }
        .number-display.compact .digit { font-size: 2.3em; padding: 12px 6px 8px; }
        .number-display.compact .pos-label {
            font-size: 0.65em;
            line-height: 1.35;
            padding: 4px 3px 6px;
        }

        /* horisontell scroll om tal är brett */
        .display-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 6px 0 22px;
        }
        .display-scroll .number-display { margin: 0; }

        /* ── navigering mellan moduler ── */
        .module-nav {
            text-align: center;
            margin: 14px 0;
        }
        .module-nav-link {
            display: inline-block;
            color: #4a90d9;
            text-decoration: none;
            font-size: 0.92em;
            padding: 7px 18px;
            border: 1.5px solid #cce0f5;
            border-radius: 20px;
            background: white;
            transition: background 0.15s;
        }
        .module-nav-link:hover { background: #e8f2ff; }

        /* ── Modul 3: talföljder ── */
        .seq-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 10px 0 18px;
        }

        .seq-num {
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            min-width: 52px;
        }

        .seq-blank {
            font-size: 1.4em;
            font-weight: bold;
            color: #4a90d9;
            text-align: center;
            min-width: 52px;
            border-bottom: 3px solid #4a90d9;
            padding-bottom: 2px;
        }

        .seq-arrow {
            font-size: 1.1em;
            color: #b8d4ef;
            flex-shrink: 0;
            user-select: none;
        }

        .level-badge {
            display: inline-block;
            font-size: 0.8em;
            color: #8aaabf;
            background: #f0f7ff;
            border: 1.5px solid #cce0f5;
            border-radius: 20px;
            padding: 3px 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html">← Avalins Matematikverkstad</a>
</nav>

<h1>🔢 Taluppfattning</h1>

<!-- ══════ Modul 1 ══════ -->
<p class="section-title" id="modul1">Modul 1 – Positionssystemet</p>

<div class="card">
    <p class="task-label">Vad är <strong>värdet</strong> av den markerade siffran?</p>

    <div class="number-display" id="m1Display"></div>

    <div class="choice-row" id="m1Choices"></div>

    <div class="btn-row">
        <button class="btn-secondary" id="m1Next">Ny uppgift →</button>
    </div>

    <p class="streak" id="m1Streak"></p>
    <div class="feedback" id="m1Feedback" aria-live="polite"></div>
</div>

<!-- ══════ Modul 2 ══════ -->
<p class="section-title" id="modul2">Modul 2 – Positionssystemet, stora tal</p>

<div class="card">
    <p class="task-label">Vad är <strong>värdet</strong> av den markerade siffran?</p>

    <div class="display-scroll">
        <div class="number-display compact" id="m2Display"></div>
    </div>

    <div class="choice-row" id="m2Choices"></div>

    <div class="btn-row">
        <button class="btn-secondary" id="m2Next">Ny uppgift →</button>
    </div>

    <p class="streak" id="m2Streak"></p>
    <div class="feedback" id="m2Feedback" aria-live="polite"></div>
</div>

<!-- ══════ Modul 3 ══════ -->
<p class="section-title">Modul 3 – Talföljder</p>

<div class="card">
    <p class="task-label">Vilket tal saknas i följden?</p>

    <div style="text-align:center">
        <span class="level-badge" id="m3LevelLabel">Nivå 1</span>
    </div>

    <div class="seq-row" id="m3Seq"></div>

    <div class="choice-row" id="m3Choices"></div>

    <div class="btn-row">
        <button class="btn-secondary" id="m3Next">Ny uppgift →</button>
    </div>

    <p class="streak" id="m3Streak"></p>
    <div class="feedback" id="m3Feedback" aria-live="polite"></div>
</div>

<script>
/* ── Streak helper ── */
function setStreak(id, n) {
    document.getElementById(id).textContent = n >= 2 ? '🐱 ' + n + ' i rad' : '';
}
let m1Streak = 0;

let m1Task     = null;
let m1Answered = false;
let m1HadError = false;

function posLabel(pv) {
    return pv === 100 ? 'Hundratal' : pv === 10 ? 'Tiotal' : 'Ental';
}

function posPlace(pv) {
    return pv === 100 ? 'hundratalsplatsen' : pv === 10 ? 'tiotalsplatsen' : 'entalsplatsen';
}

function genM1Task() {
    const use3 = Math.random() < 0.5;
    const num  = use3
        ? Math.floor(Math.random() * 900) + 100
        : Math.floor(Math.random() * 90)  + 10;
    const numStr = String(num);
    const len    = numStr.length;

    let pos;
    do { pos = Math.floor(Math.random() * len); }
    while (numStr[pos] === '0');

    const digitVal = parseInt(numStr[pos], 10);
    const posValue = Math.pow(10, len - 1 - pos);
    const correct  = digitVal * posValue;

    const distractors = [1, 10, 100]
        .filter(v => v !== posValue)
        .slice(0, 2)
        .map(v => digitVal * v);

    return { numStr, len, pos, digitVal, posValue, correct, distractors };
}

function buildM1() {
    m1Task     = genM1Task();
    m1Answered = false;
    m1HadError = false;

    /* positionstabell */
    const display = document.getElementById('m1Display');
    display.innerHTML = '';
    for (let i = 0; i < m1Task.len; i++) {
        const pv    = Math.pow(10, m1Task.len - 1 - i);
        const isHl  = i === m1Task.pos;

        const col   = document.createElement('div');
        col.className = 'digit-col';

        const dEl   = document.createElement('div');
        dEl.className = 'digit' + (isHl ? ' highlighted' : '');
        dEl.textContent = m1Task.numStr[i];

        const lEl   = document.createElement('div');
        lEl.className = 'pos-label' + (isHl ? ' highlighted' : '');
        lEl.textContent = posLabel(pv);

        col.appendChild(dEl);
        col.appendChild(lEl);
        display.appendChild(col);
    }

    /* svarsalternativ – blandade */
    const choices = [m1Task.correct, ...m1Task.distractors];
    for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
    }

    const row = document.getElementById('m1Choices');
    row.innerHTML = '';
    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = val;
        btn.addEventListener('click', () => m1Check(val, btn));
        row.appendChild(btn);
    });

    document.getElementById('m1Feedback').textContent = '';
    document.getElementById('m1Next').classList.remove('btn-pulse');
}

function m1Check(val, btn) {
    if (m1Answered) return;
    const fb = document.getElementById('m1Feedback');

    if (val === m1Task.correct) {
        m1Answered = true;
        btn.classList.add('ok');
        document.querySelectorAll('#m1Choices .choice-btn').forEach(b => { b.disabled = true; });
        if (!m1HadError) { m1Streak++; } else { m1Streak = 0; }
        setStreak('m1Streak', m1Streak);
        fb.textContent = '🐱 Rätt! Siffran ' + m1Task.digitVal + ' på ' +
            posPlace(m1Task.posValue) + ' är värd ' + m1Task.correct + '. Jättebra, Avalin!';
        document.getElementById('m1Next').classList.add('btn-pulse');
    } else {
        m1HadError = true;
        btn.classList.add('err');
        btn.disabled = true;
        fb.textContent = 'Nästan! Titta på vilket ställe siffran står på.';
    }
}

document.getElementById('m1Next').addEventListener('click', buildM1);

buildM1();

/* ════════════════════════════════
   Modul 2 – Positionssystemet, stora tal
════════════════════════════════ */

const M2_LABELS = {
    1:      'Ental',
    10:     'Tiotal',
    100:    'Hundratal',
    1000:   'Tusental',
    10000:  'Tio­tusental',
    100000: 'Hundra­tusental'
};

const M2_PLACES = {
    1:      'entalsplatsen',
    10:     'tiotalsplatsen',
    100:    'hundratalsplatsen',
    1000:   'tusentalsplatsen',
    10000:  'tiotusentalsplatsen',
    100000: 'hundratusentalsplatsen'
};

function formatNum(n) {
    return new Intl.NumberFormat('sv-SE').format(n);
}

let m2Streak   = 0;
let m2Task     = null;
let m2Answered = false;
let m2HadError = false;

function genM2Task() {
    const digits = Math.floor(Math.random() * 3) + 4;
    let num;
    if (digits === 4)      num = Math.floor(Math.random() * 9000)   + 1000;
    else if (digits === 5) num = Math.floor(Math.random() * 90000)  + 10000;
    else                   num = Math.floor(Math.random() * 900000) + 100000;

    const numStr = String(num);
    const len    = numStr.length;

    let pos;
    do { pos = Math.floor(Math.random() * len); }
    while (numStr[pos] === '0');

    const digitVal = parseInt(numStr[pos], 10);
    const posValue = Math.pow(10, len - 1 - pos);
    const correct  = digitVal * posValue;

    const allPVs   = Array.from({ length: len }, (_, i) => Math.pow(10, len - 1 - i));
    const otherPVs = allPVs.filter(pv => pv !== posValue);
    for (let i = otherPVs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [otherPVs[i], otherPVs[j]] = [otherPVs[j], otherPVs[i]];
    }
    const distractors = otherPVs.slice(0, 2).map(pv => digitVal * pv);

    return { numStr, len, pos, digitVal, posValue, correct, distractors };
}

function buildM2() {
    m2Task     = genM2Task();
    m2Answered = false;
    m2HadError = false;

    const display = document.getElementById('m2Display');
    display.innerHTML = '';
    for (let i = 0; i < m2Task.len; i++) {
        const pv   = Math.pow(10, m2Task.len - 1 - i);
        const isHl = i === m2Task.pos;

        const col  = document.createElement('div');
        col.className = 'digit-col';

        const dEl  = document.createElement('div');
        dEl.className   = 'digit' + (isHl ? ' highlighted' : '');
        dEl.textContent = m2Task.numStr[i];

        const lEl  = document.createElement('div');
        lEl.className   = 'pos-label' + (isHl ? ' highlighted' : '');
        lEl.textContent = M2_LABELS[pv];

        col.appendChild(dEl);
        col.appendChild(lEl);
        display.appendChild(col);
    }

    const choices = [m2Task.correct, ...m2Task.distractors];
    for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
    }

    const row = document.getElementById('m2Choices');
    row.innerHTML = '';
    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = formatNum(val);
        btn.addEventListener('click', () => m2Check(val, btn));
        row.appendChild(btn);
    });

    document.getElementById('m2Feedback').textContent = '';
    document.getElementById('m2Next').classList.remove('btn-pulse');
}

function m2Check(val, btn) {
    if (m2Answered) return;
    const fb = document.getElementById('m2Feedback');

    if (val === m2Task.correct) {
        m2Answered = true;
        btn.classList.add('ok');
        document.querySelectorAll('#m2Choices .choice-btn').forEach(b => { b.disabled = true; });
        if (!m2HadError) { m2Streak++; } else { m2Streak = 0; }
        setStreak('m2Streak', m2Streak);
        fb.textContent = '🐱 Rätt! Siffran ' + m2Task.digitVal + ' på ' +
            M2_PLACES[m2Task.posValue] + ' är värd ' + formatNum(m2Task.correct) + '. Jättebra, Avalin!';
        document.getElementById('m2Next').classList.add('btn-pulse');
    } else {
        m2HadError = true;
        btn.classList.add('err');
        btn.disabled = true;
        fb.textContent = 'Nästan! Titta på vilket ställe siffran står på.';
    }
}

document.getElementById('m2Next').addEventListener('click', buildM2);

buildM2();

/* ════════════════════════════════
   Modul 3 – Talföljder
════════════════════════════════ */

const M3_LEVELS = [
    { steps: [10, 100] },
    { steps: [1000, 10000] },
    { steps: [100000] }
];

let m3Streak = 0, m3Task = null, m3Answered = false, m3HadError = false;
let m3Level = 0;        /* 0=Nivå 1, 1=Nivå 2, 2=Nivå 3 */
let m3LevelStreak = 0;  /* rätta i rad utan fel på aktuell nivå */

function fmtSeq(n) {
    return new Intl.NumberFormat('sv-SE').format(n);
}

function genM3Task() {
    const cfg  = M3_LEVELS[m3Level];
    const step = cfg.steps[Math.floor(Math.random() * cfg.steps.length)];
    const len  = Math.random() < 0.5 ? 3 : 4;

    /* Startvärde: rent multiplum av step, plus liten offset på nivå 3 */
    const startK  = Math.floor(Math.random() * 8) + 1;
    const offset  = m3Level === 2
        ? (Math.floor(Math.random() * 9) + 1) * (step / 20)
        : 0;
    const start = step * startK + offset;

    const series = Array.from({ length: len }, (_, i) => start + step * i);

    /* Saknad position: slumpat bland alla index */
    const missingIdx = Math.floor(Math.random() * len);
    const correct    = series[missingIdx];

    /* Distraktorer: ±steg och ±dubbelsteg, filtrerat på positiva */
    const distCands = [
        correct + step, correct - step,
        correct + 2 * step, correct - 2 * step
    ].filter(v => v > 0 && v !== correct);

    for (let i = distCands.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [distCands[i], distCands[j]] = [distCands[j], distCands[i]];
    }
    /* Säkerhetsnät om < 2 kandidater */
    let ex = 3;
    while (distCands.length < 2) { distCands.push(correct + step * ex++); }

    return { series, missingIdx, correct, step, distractors: distCands.slice(0, 2) };
}

function buildM3() {
    m3Task = genM3Task(); m3Answered = false; m3HadError = false;

    /* Talföljd */
    const seqEl = document.getElementById('m3Seq');
    seqEl.innerHTML = '';
    m3Task.series.forEach((num, i) => {
        if (i > 0) {
            const arr = document.createElement('span');
            arr.className = 'seq-arrow';
            arr.textContent = '→';
            seqEl.appendChild(arr);
        }
        const el = document.createElement('span');
        if (i === m3Task.missingIdx) {
            el.className = 'seq-blank';
            el.textContent = '___';
        } else {
            el.className = 'seq-num';
            el.textContent = fmtSeq(num);
        }
        seqEl.appendChild(el);
    });

    /* Svarsalternativ */
    const choices = [m3Task.correct, ...m3Task.distractors];
    for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
    }
    const row = document.getElementById('m3Choices');
    row.innerHTML = '';
    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = fmtSeq(val);
        btn.addEventListener('click', () => m3Check(val, btn));
        row.appendChild(btn);
    });

    document.getElementById('m3LevelLabel').textContent = 'Nivå ' + (m3Level + 1);
    document.getElementById('m3Feedback').textContent   = '';
    document.getElementById('m3Next').classList.remove('btn-pulse');
}

function m3Check(val, btn) {
    if (m3Answered) return;
    const fb = document.getElementById('m3Feedback');

    if (val === m3Task.correct) {
        m3Answered = true;
        btn.classList.add('ok');
        document.querySelectorAll('#m3Choices .choice-btn').forEach(b => { b.disabled = true; });

        if (!m3HadError) {
            m3Streak++;
            m3LevelStreak++;
        } else {
            m3Streak = 0;
            m3LevelStreak = 0;
        }
        setStreak('m3Streak', m3Streak);

        if (m3LevelStreak >= 3 && m3Level < M3_LEVELS.length - 1) {
            m3Level++;
            m3LevelStreak = 0;
            fb.textContent = 'Precis rätt! 🎉 Superbra – nu provar vi ännu större tal!';
        } else {
            fb.textContent = 'Precis rätt! 🎉 Jättebra, Avalin!';
        }
        document.getElementById('m3Next').classList.add('btn-pulse');
    } else {
        m3HadError = true;
        m3LevelStreak = 0;
        btn.classList.add('err');
        btn.disabled = true;
        fb.textContent = 'Nästan – det var ' + fmtSeq(m3Task.correct) + '. Titta på steget i följden!';
    }
}

document.getElementById('m3Next').addEventListener('click', buildM3);

buildM3();
</script>
</body>
</html>
