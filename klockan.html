<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klockan – Avalins Matematikverkstad</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --color-bg:             #FDF6EC;
            --color-surface:        #FFF8F0;
            --color-surface-alt:    #F5ECD7;
            --color-border:         #EDE0C8;
            --color-primary:        #D97B3A;
            --color-primary-hover:  #E8955A;
            --color-correct:        #6B9E6B;
            --color-wrong:          #C0614A;
            --color-text:           #4A3728;
            --color-text-secondary: #7A5C42;
            --color-heading:        #A0784A;
            --color-badge:          #C8A882;

            --clr-bg:         var(--color-bg);
            --clr-card:       var(--color-surface);
            --clr-hover:      var(--color-surface-alt);
            --clr-badge-bg:   var(--color-surface-alt);
            --clr-text:       var(--color-text);
            --clr-text-sub:   var(--color-text-secondary);
            --clr-text-dim:   var(--color-text-secondary);
            --clr-nav:        var(--color-text-secondary);
            --clr-primary:    var(--color-primary);
            --clr-primary-dk: var(--color-primary-hover);
            --clr-border:     var(--color-border);
            --clr-border-dk:  var(--color-border);
            --clr-ok:         var(--color-correct);
            --clr-ok-bg:      #E8F5E8;
            --clr-ok-text:    var(--color-correct);
            --clr-err:        var(--color-wrong);
            --clr-err-bg:     #FAEDEA;
            --clr-err-text:   var(--color-wrong);
        }

        h1 { margin-bottom: 22px; }

        /* ── Klock-specifik knapprad ── */
        .btn-row {
            max-width: 480px;
            margin: 0 auto 8px;
            gap: 12px;
        }

        button       { font-size: 1.1em; padding: 12px 28px; }
        button:active { transform: scale(0.96); }

        #checkBtn       { background: var(--color-primary); color: white; box-shadow: 0 4px 12px rgba(74,144,217,0.35); }
        #checkBtn:hover { background: var(--color-primary-hover); }
        #nextBtn        { background: white; color: var(--color-primary); border: 2px solid var(--color-primary); }
        #nextBtn:hover  { background: var(--color-surface-alt); }

        /* ── Klocka ── */
        .clock-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
        svg#clock   { filter: drop-shadow(0 4px 16px rgba(44,62,80,0.18)); }

        /* ── Steg-lista ── */
        .steps    { max-width: 480px; margin: 0 auto 20px; display: flex; flex-direction: column; gap: 12px; }
        .step     { background: white; border-radius: 16px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(44,62,80,0.08); transition: background 0.3s; }
        .step.done { background: #E8F5E8; }

        .step-num { width: 38px; height: 38px; border-radius: 50%; background: var(--color-primary); color: white; font-size: 1.15em; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s; }
        .step.done .step-num { background: var(--color-correct); }

        .step-label { flex: 1; font-size: 1.1em; color: var(--color-text-secondary); line-height: 1.3; }

        .step input { width: 78px; font-size: 1.25em; padding: 7px 8px; border: 2.5px solid var(--color-border); border-radius: 8px; text-align: center; outline: none; font-family: inherit; transition: border-color 0.3s, background 0.3s; }
        .step input:focus { border-color: var(--color-primary); }
        .step input.ok    { border-color: var(--color-correct);  background: #E8F5E8; }
        .step input.fel   { border-color: #e67e22; background: #fffaf2; }

        .input-wrap  { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .field-hint  { font-size: 0.78em; color: #e67e22; text-align: center; max-width: 140px; line-height: 1.3; min-height: 0; }
        .step-hint   { display: block; max-width: 480px; margin: -6px auto 0; }
        .time-group  { display: flex; align-items: center; gap: 4px; }
        .time-group input, #timeHrIn, #timeMinIn { width: 62px; }
        .colon { font-size: 1.4em; font-weight: bold; color: var(--color-text-secondary); line-height: 1; }

        .clock-tip { text-align: center; font-size: 0.85em; color: var(--color-text-secondary); margin-top: -18px; margin-bottom: 22px; }

        #feedback { max-width: 480px; margin: 18px auto 0; font-size: 1.15em; color: var(--color-text); text-align: center; line-height: 1.7; min-height: 54px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html">← Avalins Matematikverkstad</a>
    </nav>

    <h1>🕐 Klockan</h1>

    <div class="clock-wrap">
        <svg id="clock" width="260" height="260" viewBox="0 0 300 300" aria-label="Analog klocka">
            <!-- Urtavla -->
            <circle cx="150" cy="150" r="138" fill="white" stroke="#C8A882" stroke-width="3"/>

            <!-- Streck och siffror fylls i av JS -->
            <g id="ticks"></g>
            <g id="nums" font-family="Arial" font-weight="bold" font-size="22"
               text-anchor="middle" dominant-baseline="central" fill="#4A3728"></g>

            <!-- Minutvisare (lång, röd) -->
            <line id="minHand" x1="150" y1="150" x2="150" y2="50"
                  stroke="#7A5C42" stroke-width="5" stroke-linecap="round"/>

            <!-- Timvisare (kort, mörk) – ritas ovanpå minutvisaren -->
            <line id="hrHand" x1="150" y1="150" x2="150" y2="82"
                  stroke="#4A3728" stroke-width="9" stroke-linecap="round"/>

            <!-- Navknappar -->
            <circle cx="150" cy="150" r="9"   fill="#2c3e50"/>
            <circle cx="150" cy="150" r="4.5" fill="#d94a4a"/>
        </svg>
    </div>

    <p class="clock-tip">Tips: Timvisaren är den korta och tjocka. Den pekar på det nummer den just passerat.</p>

    <div class="steps">
        <div class="step" id="step1">
            <div class="step-num">1</div>
            <span class="step-label">Timvisaren pekar på...</span>
            <div class="input-wrap">
                <input id="hrIn" type="text" inputmode="numeric" maxlength="2" placeholder="">
                <span class="field-hint" id="hrHint"></span>
            </div>
        </div>
        <div class="step" id="step2">
            <div class="step-num">2</div>
            <span class="step-label">Minutvisaren visar... minuter</span>
            <div class="input-wrap">
                <input id="minIn" type="text" inputmode="numeric" maxlength="2" placeholder="">
                <span class="field-hint" id="minHint"></span>
            </div>
        </div>
        <div class="step" id="step3">
            <div class="step-num">3</div>
            <span class="step-label">Klockan är...</span>
            <div class="time-group">
                <input id="timeHrIn" type="text" inputmode="numeric" maxlength="2" placeholder="">
                <span class="colon">:</span>
                <input id="timeMinIn" type="text" inputmode="numeric" maxlength="2" placeholder="">
            </div>
        </div>
        <span class="field-hint step-hint" id="timeHrHint"></span>
    </div>

    <div class="btn-row">
        <button id="checkBtn">Kolla svaret ✓</button>
        <button id="nextBtn">Nästa tid →</button>
    </div>

    <p class="streak" id="streak"></p>
    <div id="feedback" aria-live="polite"></div>

    <script>
        let h = 3, m = 20;
        let streak = 0;
        let hadError = false;
        function setStreak(n) {
            document.getElementById('streak').textContent = n >= 2 ? '🐱\u00a0' + n + '\u00a0i\u00a0rad' : '';
        }

        const CAT_NAME = "Miso";

        const misoContainer = document.createElement('div');
        misoContainer.id = 'miso-container';
        misoContainer.style.cssText = 'position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;z-index:1000;';

        const misoBubble = document.createElement('div');
        misoBubble.id = 'miso-bubble';
        misoBubble.style.cssText = 'background:#FFF8F0;border:2px solid #EDE0C8;border-radius:16px;padding:10px 14px;font-size:0.95em;color:#4A3728;max-width:200px;line-height:1.4;display:none;text-align:center;';

        const misoImg = document.createElement('img');
        misoImg.id = 'miso-img';
        misoImg.src = 'images/miso/miso-neutral.webp';
        misoImg.alt = CAT_NAME;
        misoImg.style.cssText = 'width:clamp(100px,12vw,140px);height:auto;display:block;';

        misoContainer.appendChild(misoBubble);
        misoContainer.appendChild(misoImg);
        document.body.appendChild(misoContainer);

        function setMiso(pose, text) {
            misoImg.src = 'images/miso/' + pose;
            const bubble = document.getElementById('miso-bubble');
            if (text) {
                bubble.innerHTML = text;
                bubble.style.display = 'block';
            } else {
                bubble.style.display = 'none';
            }
        }

        /* ── Bygg urtavlan en gång ── */
        (function buildFace() {
            const tg = document.getElementById('ticks');
            const ng = document.getElementById('nums');

            for (let i = 0; i < 60; i++) {
                const a     = (i / 60) * 2 * Math.PI - Math.PI / 2;
                const major = i % 5 === 0;
                const r1    = major ? 117 : 126;
                const ln    = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                ln.setAttribute('x1', 150 + r1  * Math.cos(a));
                ln.setAttribute('y1', 150 + r1  * Math.sin(a));
                ln.setAttribute('x2', 150 + 136 * Math.cos(a));
                ln.setAttribute('y2', 150 + 136 * Math.sin(a));
                ln.setAttribute('stroke', major ? '#C8A882' : '#EDE0C8');
                ln.setAttribute('stroke-width', major ? 2.5 : 1.2);
                tg.appendChild(ln);
            }

            for (let n = 1; n <= 12; n++) {
                const a  = (n / 12) * 2 * Math.PI - Math.PI / 2;
                const tx = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                tx.setAttribute('x', 150 + 102 * Math.cos(a));
                tx.setAttribute('y', 150 + 102 * Math.sin(a));
                tx.textContent = n;
                ng.appendChild(tx);
            }
        })();

        /* ── Rita visarna ── */
        function drawHands() {
            const hrDeg  = ((h % 12) + m / 60) / 12 * 360;
            const minDeg = m / 60 * 360;
            document.getElementById('hrHand').setAttribute('transform',
                `rotate(${hrDeg},150,150)`);
            document.getElementById('minHand').setAttribute('transform',
                `rotate(${minDeg},150,150)`);
        }

        /* ── Ny slumpmässig tid ── */
        function nextTime() {
            h = Math.floor(Math.random() * 12) + 1;  // 1–12
            m = Math.floor(Math.random() * 12) * 5;  // 0, 5, 10, …, 55
            drawHands();
            reset();
            setMiso('miso-neutral.webp', null);
        }

        /* ── Återställ formuläret ── */
        function reset() {
            ['hrIn', 'minIn', 'timeHrIn', 'timeMinIn'].forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.classList.remove('ok', 'fel');
            });
            ['hrHint', 'minHint', 'timeHrHint'].forEach(id => {
                document.getElementById(id).textContent = '';
            });
            ['step1', 'step2', 'step3'].forEach(id =>
                document.getElementById(id).classList.remove('done'));
            document.getElementById('streak').textContent = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('nextBtn').classList.remove('btn-pulse');
            hadError = false;
        }

        /* ── Kolla svaret ── */
        function check() {
            const hrEl      = document.getElementById('hrIn');
            const minEl     = document.getElementById('minIn');
            const timeHrEl  = document.getElementById('timeHrIn');
            const timeMinEl = document.getElementById('timeMinIn');

            [hrEl, minEl, timeHrEl, timeMinEl].forEach(el => el.classList.remove('ok', 'fel'));
            ['hrHint', 'minHint', 'timeHrHint'].forEach(id => { document.getElementById(id).textContent = ''; });
            ['step1', 'step2', 'step3'].forEach(id =>
                document.getElementById(id).classList.remove('done'));

            const hrVal      = hrEl.value.trim();
            const minVal     = minEl.value.trim();
            const timeHrVal  = timeHrEl.value.trim();
            const timeMinVal = timeMinEl.value.trim();

            if (!hrVal && !minVal && !timeHrVal && !timeMinVal) {
                setFb('Titta på klockan och fyll i svaren! 🐱', 'neutral');
                return;
            }

            const invalidHrMsg = 'En analog klocka har siffrorna 1–12 – vilket nummer pekar visaren på?';

            let hrOk = null, minOk = null, timeOk = null;

            if (hrVal !== '') {
                const v = parseInt(hrVal);
                if (isNaN(v) || v < 1 || v > 12) {
                    hrEl.classList.add('fel');
                    document.getElementById('hrHint').textContent = invalidHrMsg;
                } else {
                    hrOk = v === h;
                    hrEl.classList.add(hrOk ? 'ok' : 'fel');
                    if (hrOk) document.getElementById('step1').classList.add('done');
                }
            }

            if (minVal !== '') {
                const mv = parseInt(minVal);
                if (isNaN(mv) || mv < 0 || mv > 59) {
                    minEl.classList.add('fel');
                    document.getElementById('minHint').textContent =
                        'Minuter är mellan 0 och 59 – räkna den långa visaren från 12';
                } else {
                    minOk = mv === m;
                    minEl.classList.add(minOk ? 'ok' : 'fel');
                    if (minOk) document.getElementById('step2').classList.add('done');
                }
            }

            const timeHrFilled  = timeHrVal  !== '';
            const timeMinFilled = timeMinVal !== '';

            if (timeHrFilled || timeMinFilled) {
                let timeHrOk = false;
                if (timeHrFilled) {
                    const v = parseInt(timeHrVal);
                    if (isNaN(v) || v < 1 || v > 12) {
                        timeHrEl.classList.add('fel');
                        document.getElementById('timeHrHint').textContent = invalidHrMsg;
                    } else {
                        timeHrOk = v === h;
                        timeHrEl.classList.add(timeHrOk ? 'ok' : 'fel');
                    }
                }
                const timeMinOk = timeMinFilled && parseInt(timeMinVal) === m;
                if (timeMinFilled) timeMinEl.classList.add(timeMinOk ? 'ok' : 'fel');
                timeOk = timeHrOk && timeMinOk;
                if (timeOk) document.getElementById('step3').classList.add('done');
            }

            /* ── Feedback ── */
            const pad = n => String(n).padStart(2, '0');

            const allDone = ['step1','step2','step3'].every(id =>
                document.getElementById(id).classList.contains('done'));

            if (allDone) {
                if (!hadError) { streak++; } else { streak = 0; } setStreak(streak);
                setFb(`🐱 Jättebra, Avalin! Klockan är ${h}:${pad(m)} — du hade rätt på allt!`, 'correct');
                document.getElementById('nextBtn').classList.add('btn-pulse');
                return;
            }

            const lines = [];

            if (hrOk === false) {
                lines.push('Titta på den <strong>korta</strong>, tjocka visaren – vilket nummer har den just passerat?');
            } else if (hrOk === true) {
                lines.push('✓ Timvisaren stämmer!');
            }

            if (minOk === false) {
                lines.push('Räkna den <strong>långa</strong> visaren från 12 – varje siffra är 5 minuter.');
            } else if (minOk === true) {
                lines.push('✓ Minuterna stämmer!');
            }

            if ((timeHrFilled || timeMinFilled) && timeOk === false) {
                if (hrOk === true && minOk === true) {
                    lines.push('Du vet ju svaret – fyll i timme och minuter var för sig!');
                } else {
                    lines.push('Fyll i steg 1 och 2 rätt, så blir steg 3 lättare!');
                }
            } else if (timeOk === true) {
                lines.push('✓ Klockan stämmer!');
            }

            hadError = true;
            streak = 0; setStreak(0);
            document.getElementById('nextBtn').classList.remove('btn-pulse');
            setFb(lines.join('<br>'), 'error');
        }

        function setFb(html, type) {
            document.getElementById('feedback').innerHTML = html;
            if (type === 'correct') {
                setMiso('miso-glad.webp', 'Jättebra! 🐱');
            } else if (type === 'error') {
                setMiso('miso-uppmuntrande.webp', 'Nästan! Titta igen 🐾');
            } else {
                setMiso('miso-neutral.webp', null);
            }
        }

        /* ── Händelser ── */
        document.getElementById('checkBtn').addEventListener('click', check);
        document.getElementById('nextBtn').addEventListener('click', nextTime);

        const allowed = new Set(['Backspace','Delete','Tab','ArrowLeft','ArrowRight']);

        ['hrIn', 'minIn', 'timeHrIn', 'timeMinIn'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter') { check(); return; }
                if (!allowed.has(e.key) && !/^[0-9]$/.test(e.key)) e.preventDefault();
            });
            el.addEventListener('input', function () {
                if (this.value.length > 2) this.value = this.value.slice(0, 2);
            });
        });


        /* ── Starta med en slumpmässig tid ── */
        nextTime();
    </script>
</body>
</html>
