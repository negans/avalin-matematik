<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decimaltal – Avalins Matematikverkstad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f7ff;
            min-height: 100vh;
            padding: 16px 16px 48px;
        }

        .top-nav { text-align: center; margin-bottom: 10px; }
        .top-nav a { color: #7a9cbf; text-decoration: none; font-size: 0.95em; }
        .top-nav a:hover { text-decoration: underline; }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.9em;
            margin-bottom: 6px;
        }

        .section-title {
            text-align: center;
            font-size: 1.05em;
            font-weight: bold;
            color: #4a90d9;
            margin: 22px 0 10px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 22px 20px 20px;
            max-width: 500px;
            margin: 0 auto 12px;
            box-shadow: 0 2px 12px rgba(44,62,80,0.09);
        }

        .task-label {
            text-align: center;
            font-size: 1.2em;
            color: #2c3e50;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            font-family: Arial, sans-serif;
            font-size: 1.05em;
            padding: 11px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.45; cursor: not-allowed; }

        .btn-secondary {
            background: white;
            color: #4a90d9;
            border: 2px solid #4a90d9;
        }
        .btn-secondary:hover { background: #e8f2ff; }

        @keyframes btn-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74,144,217,0.5); }
            60%  { box-shadow: 0 0 0 8px rgba(74,144,217,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,144,217,0); }
        }
        .btn-pulse { animation: btn-pulse 1.1s ease-out infinite; }

        .streak {
            text-align: center;
            font-size: 0.85em;
            color: #8aaabf;
            min-height: 18px;
            margin-top: 8px;
        }

        .feedback {
            text-align: center;
            font-size: 1.05em;
            color: #2c3e50;
            min-height: 28px;
            margin-top: 4px;
            line-height: 1.5;
        }

        .level-badge {
            display: inline-block;
            font-size: 0.8em;
            color: #8aaabf;
            background: #f0f7ff;
            border: 1.5px solid #cce0f5;
            border-radius: 20px;
            padding: 3px 12px;
            margin-bottom: 10px;
        }

        /* Numeriska svarsalternativ (Modul 2) */
        .choice-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 0 0 10px;
        }

        .choice-btn {
            font-family: Arial, sans-serif;
            font-size: 1.4em;
            font-weight: bold;
            padding: 14px 22px;
            border: 2.5px solid #4a90d9;
            border-radius: 16px;
            background: white;
            color: #2c3e50;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            min-width: 88px;
            text-align: center;
        }
        .choice-btn:hover:not(:disabled) { background: #e8f2ff; border-color: #3a7fc8; }
        .choice-btn:active:not(:disabled) { transform: scale(0.95); }
        .choice-btn:disabled { cursor: not-allowed; }
        .choice-btn.ok  { background: #f0fff4; border-color: #2ecc71; color: #27ae60; opacity: 1; }
        .choice-btn.err { background: #fff5f5; border-color: #e74c3c; color: #c0392b; opacity: 0.45; }

        /* Textbeskrivningar (Modul 1) */
        .choice-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 4px 0 12px;
        }

        .choice-btn-text {
            font-family: Arial, sans-serif;
            font-size: 1em;
            padding: 12px 16px;
            border: 2.5px solid #4a90d9;
            border-radius: 14px;
            background: white;
            color: #2c3e50;
            cursor: pointer;
            text-align: left;
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }
        .choice-btn-text:hover:not(:disabled) { background: #e8f2ff; border-color: #3a7fc8; }
        .choice-btn-text:active:not(:disabled) { transform: scale(0.98); }
        .choice-btn-text:disabled { cursor: not-allowed; }
        .choice-btn-text.ok  { background: #f0fff4; border-color: #2ecc71; color: #27ae60; opacity: 1; }
        .choice-btn-text.err { background: #fff5f5; border-color: #e74c3c; color: #c0392b; opacity: 0.45; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html">← Avalins Matematikverkstad</a>
</nav>

<h1>💯 Decimaltal</h1>

<!-- ══════ Modul 1 ══════ -->
<p class="section-title">Modul 1 – Vad är ett decimaltal?</p>

<div class="card">
    <p class="task-label">Välj rätt beskrivning av talet.</p>

    <div style="text-align:center">
        <span class="level-badge" id="m1LevelLabel">Nivå 1</span>
    </div>

    <p id="m1Number" style="text-align:center; font-size:3em; font-weight:bold; color:#2c3e50; margin:8px 0 20px; letter-spacing:0.05em"></p>

    <div class="choice-col" id="m1Choices"></div>

    <div class="btn-row">
        <button class="btn-secondary" id="m1Next">Ny uppgift →</button>
    </div>

    <p class="streak" id="m1Streak"></p>
    <div class="feedback" id="m1Feedback" aria-live="polite"></div>
</div>

<!-- ══════ Modul 2 ══════ -->
<p class="section-title">Modul 2 – Jämföra decimaltal</p>

<div class="card">
    <p class="task-label">Vilket tal är störst?</p>

    <div style="text-align:center">
        <span class="level-badge" id="m2LevelLabel">Nivå 1</span>
    </div>

    <div class="choice-row" id="m2Choices"></div>

    <div class="btn-row">
        <button class="btn-secondary" id="m2Next">Ny uppgift →</button>
    </div>

    <p class="streak" id="m2Streak"></p>
    <div class="feedback" id="m2Feedback" aria-live="polite"></div>
</div>

<script>
/* ── Hjälpfunktioner ── */
function setStreak(id, n) {
    document.getElementById(id).textContent = n >= 2 ? '🐱 ' + n + ' i rad' : '';
}

function rnd(a, b) {
    return Math.floor(Math.random() * (b - a + 1)) + a;
}

/* ════════════════════════════════
   Modul 1 – Vad är ett decimaltal?
════════════════════════════════ */

const WHOLE_WORDS = [
    'noll', 'ett', 'två', 'tre', 'fyra', 'fem', 'sex', 'sju', 'åtta', 'nio',
    'tio', 'elva', 'tolv', 'tretton', 'fjorton', 'femton', 'sexton', 'sjutton', 'arton', 'nitton'
];

const DEC_ONES = ['', 'en', 'två', 'tre', 'fyra', 'fem', 'sex', 'sju', 'åtta', 'nio'];

function decWord(d, unit) {
    if (d === 1) return 'en ' + unit;
    return DEC_ONES[d] + ' ' + unit + 'ar';
}

function makeDesc(whole, d1, d2) {
    /* d2 undefined → Nivå 1 (bara tiondelar) */
    let decPart;
    if (d2 === undefined) {
        decPart = decWord(d1, 'tiondel');
    } else if (d1 === 0) {
        decPart = decWord(d2, 'hundradel');
    } else {
        decPart = decWord(d1, 'tiondel') + ' och ' + decWord(d2, 'hundradel');
    }
    return whole === 0 ? decPart : WHOLE_WORDS[whole] + ' och ' + decPart;
}

let m1Streak = 0, m1Task = null, m1Answered = false, m1HadError = false;
let m1Level = 0, m1LevelStreak = 0;

function genM1Task() {
    let whole, d1, d2, display;

    if (m1Level === 0) {
        whole   = rnd(0, 9);
        d1      = rnd(1, 9);
        d2      = undefined;
        display = whole + ',' + d1;
    } else if (m1Level === 1) {
        whole   = rnd(0, 9);
        d1      = rnd(0, 9);
        d2      = rnd(1, 9);
        display = whole + ',' + d1 + d2;
    } else {
        whole   = rnd(0, 19);
        d1      = rnd(1, 9);
        d2      = rnd(1, 9);
        display = whole + ',' + d1 + d2;
    }

    const correct = makeDesc(whole, d1, d2);

    /* Bygg distraktorer */
    const seen = new Set([correct]);
    const pool = [];

    if (m1Level === 0) {
        pool.push(makeDesc(whole, 0, d1));                         /* byt enhet: som hundradelar */
        if (d1 > 1) pool.push(makeDesc(whole, d1 - 1, undefined));
        if (d1 < 9) pool.push(makeDesc(whole, d1 + 1, undefined));
        if (whole === 0) {
            pool.push(makeDesc(1, d1, undefined));
            pool.push(makeDesc(2, d1, undefined));
        } else {
            pool.push(makeDesc(0, d1, undefined));
            if (whole > 1) pool.push(makeDesc(whole - 1, d1, undefined));
            if (whole < 9) pool.push(makeDesc(whole + 1, d1, undefined));
        }
    } else if (m1Level === 1) {
        if (d1 === 0) {
            pool.push(makeDesc(whole, d2, undefined));             /* byt enhet: som tiondelar */
            if (d2 > 1) pool.push(makeDesc(whole, 0, d2 - 1));
            if (d2 < 9) pool.push(makeDesc(whole, 0, d2 + 1));
            if (whole === 0) { pool.push(makeDesc(1, 0, d2)); pool.push(makeDesc(2, 0, d2)); }
            else             { pool.push(makeDesc(0, 0, d2)); pool.push(makeDesc(whole + 1, 0, d2)); }
        } else {
            pool.push(makeDesc(whole, d1, undefined));             /* utelämna hundradelar */
            pool.push(makeDesc(whole, 0, d2));                     /* utelämna tiondelar */
            if (d1 > 1) pool.push(makeDesc(whole, d1 - 1, d2));
            if (d1 < 9) pool.push(makeDesc(whole, d1 + 1, d2));
            if (d2 > 1) pool.push(makeDesc(whole, d1, d2 - 1));
            if (d2 < 9) pool.push(makeDesc(whole, d1, d2 + 1));
        }
    } else {
        pool.push(makeDesc(whole, d1, undefined));
        pool.push(makeDesc(whole, 0, d2));
        if (d1 > 1) pool.push(makeDesc(whole, d1 - 1, d2));
        if (d1 < 9) pool.push(makeDesc(whole, d1 + 1, d2));
        if (d2 > 1) pool.push(makeDesc(whole, d1, d2 - 1));
        if (d2 < 9) pool.push(makeDesc(whole, d1, d2 + 1));
        if (whole > 0)  pool.push(makeDesc(whole - 1, d1, d2));
        if (whole < 19) pool.push(makeDesc(whole + 1, d1, d2));
    }

    const distractors = [];
    for (const c of pool) {
        if (!seen.has(c)) { seen.add(c); distractors.push(c); }
        if (distractors.length >= 3) break;
    }

    return { display, correct, distractors };
}

function buildM1() {
    m1Task = genM1Task(); m1Answered = false; m1HadError = false;

    document.getElementById('m1Number').textContent = m1Task.display;

    const allWords = [m1Task.correct, ...m1Task.distractors];
    for (let i = allWords.length - 1; i > 0; i--) {
        const j = rnd(0, i);
        [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
    }

    const col = document.getElementById('m1Choices');
    col.innerHTML = '';
    allWords.forEach(word => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn-text';
        btn.textContent = word;
        btn.addEventListener('click', () => m1Check(word, btn));
        col.appendChild(btn);
    });

    document.getElementById('m1LevelLabel').textContent = 'Nivå ' + (m1Level + 1);
    document.getElementById('m1Feedback').textContent   = '';
    document.getElementById('m1Next').classList.remove('btn-pulse');
}

function m1Check(word, btn) {
    if (m1Answered) return;
    const fb = document.getElementById('m1Feedback');

    if (word === m1Task.correct) {
        m1Answered = true;
        btn.classList.add('ok');
        document.querySelectorAll('#m1Choices .choice-btn-text').forEach(b => { b.disabled = true; });

        if (!m1HadError) { m1Streak++; m1LevelStreak++; }
        else             { m1Streak = 0; m1LevelStreak = 0; }
        setStreak('m1Streak', m1Streak);

        if (m1LevelStreak >= 3 && m1Level < 2) {
            m1Level++;
            m1LevelStreak = 0;
            fb.textContent = 'Precis rätt! 🎉 Superbra – nu provar vi svårare tal!';
        } else {
            fb.textContent = 'Precis rätt! 🎉 Jättebra, Avalin!';
        }
        document.getElementById('m1Next').classList.add('btn-pulse');
    } else {
        m1HadError    = true;
        m1LevelStreak = 0;
        btn.classList.add('err');
        btn.disabled = true;
        fb.textContent = 'Nästan! ' + m1Task.display + ' heter "' + m1Task.correct + '".';
    }
}

document.getElementById('m1Next').addEventListener('click', buildM1);
buildM1();

/* ════════════════════════════════
   Modul 2 – Jämföra decimaltal
════════════════════════════════ */

let m2Streak = 0, m2Task = null, m2Answered = false, m2HadError = false;
let m2Level = 0, m2LevelStreak = 0;

function genM2Task() {
    let optA, optB, correctDisp, feedback;

    if (m2Level === 0) {
        /* Nivå 1: 0,X vs 0,Y — båda tiondelar */
        const d1 = rnd(1, 9);
        let d2;
        do { d2 = rnd(1, 9); } while (d2 === d1);
        const dispD1 = '0,' + d1, dispD2 = '0,' + d2;
        correctDisp = d1 > d2 ? dispD1 : dispD2;
        feedback = 'Nästan – ' + correctDisp + ' är störst.';
        if (Math.random() < 0.5) { optA = dispD1; optB = dispD2; }
        else                      { optA = dispD2; optB = dispD1; }

    } else if (m2Level === 1) {
        /* Nivå 2: 0,X vs 0,0Y (Y > X) — vanlig fälla */
        const X = rnd(1, 7);
        const Y = rnd(X + 1, 9);
        const tenth = '0,' + X;
        const hund  = '0,0' + Y;
        correctDisp = tenth;   /* 0,X > 0,0Y alltid */
        feedback = 'Nästan – ' + tenth + ' är större än ' + hund +
                   ' även om ' + Y + ' > ' + X + '. Titta på tiondelarna först!';
        if (Math.random() < 0.5) { optA = tenth; optB = hund; }
        else                      { optA = hund;  optB = tenth; }

    } else {
        /* Nivå 3: W,D vs W,d2d3 — en mot två decimaler, samma heltal */
        const whole = rnd(1, 5);
        const d1    = rnd(1, 9);
        const d2    = rnd(1, 9);
        const d3    = rnd(1, 9);
        const dispA0 = whole + ',' + d1;
        const dispB0 = whole + ',' + d2 + '' + d3;
        /* Jämför med heltal för att undvika floating-point-fel:
           valA = d1*10, valB = d2*10+d3. Eftersom d3 ≥ 1 är valB inte
           delbart med 10, medan valA är det — de är alltid olika. */
        const valA   = d1 * 10;
        const valB   = d2 * 10 + d3;
        correctDisp  = valA > valB ? dispA0 : dispB0;
        feedback = 'Nästan – ' + correctDisp + ' är störst. Jämför tiondel för tiondel!';
        if (Math.random() < 0.5) { optA = dispA0; optB = dispB0; }
        else                      { optA = dispB0; optB = dispA0; }
    }

    return { optA, optB, correctDisp, feedback };
}

function buildM2() {
    m2Task = genM2Task(); m2Answered = false; m2HadError = false;

    const row = document.getElementById('m2Choices');
    row.innerHTML = '';
    [m2Task.optA, m2Task.optB].forEach(disp => {
        const btn = document.createElement('button');
        btn.className      = 'choice-btn';
        btn.style.fontSize = '1.7em';
        btn.textContent    = disp;
        btn.addEventListener('click', () => m2Check(disp, btn));
        row.appendChild(btn);
    });

    document.getElementById('m2LevelLabel').textContent = 'Nivå ' + (m2Level + 1);
    document.getElementById('m2Feedback').textContent   = '';
    document.getElementById('m2Next').classList.remove('btn-pulse');
}

function m2Check(disp, btn) {
    if (m2Answered) return;
    const fb = document.getElementById('m2Feedback');

    if (disp === m2Task.correctDisp) {
        m2Answered = true;
        btn.classList.add('ok');
        document.querySelectorAll('#m2Choices .choice-btn').forEach(b => { b.disabled = true; });

        if (!m2HadError) { m2Streak++; m2LevelStreak++; }
        else             { m2Streak = 0; m2LevelStreak = 0; }
        setStreak('m2Streak', m2Streak);

        if (m2LevelStreak >= 3 && m2Level < 2) {
            m2Level++;
            m2LevelStreak = 0;
            fb.textContent = 'Precis rätt! 🎉 Superbra – nu provar vi svårare tal!';
        } else {
            fb.textContent = 'Precis rätt! 🎉 Jättebra, Avalin!';
        }
        document.getElementById('m2Next').classList.add('btn-pulse');
    } else {
        m2HadError    = true;
        m2LevelStreak = 0;
        btn.classList.add('err');
        btn.disabled = true;
        fb.textContent = m2Task.feedback;
    }
}

document.getElementById('m2Next').addEventListener('click', buildM2);
buildM2();
</script>
</body>
</html>
